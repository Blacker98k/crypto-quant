<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>crypto-quant 实时交易看板</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg:#fbfbfa;
    --surface:#ffffff;
    --surface-2:#f7f6f3;
    --surface-3:#efeeec;
    --border:#e8e8e6;
    --border-strong:#d3d2cf;
    --text:#1a1a1a;
    --text-2:#6b6b67;
    --text-3:#9b9b97;
    --accent:#2383e2;
    --accent-bg:#e7f3fe;
    --green:#0f7b3b;
    --green-bg:#e8f3ee;
    --red:#d73a49;
    --red-bg:#fae9eb;
    --warn:#cb6e17;
    --warn-bg:#fbf0e3;
    --radius-sm:6px;
    --radius:10px;
    --radius-lg:14px;
    --shadow-sm:0 1px 2px rgba(15,15,15,.04);
    --shadow:0 1px 3px rgba(15,15,15,.04), 0 4px 12px rgba(15,15,15,.04);
  }
  *, *::before, *::after { box-sizing:border-box }
  html, body { margin:0; padding:0 }
  body {
    background:var(--bg);
    color:var(--text);
    font-family:"Inter", system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size:14px;
    line-height:1.5;
    font-feature-settings:"cv11";
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  .mono { font-family:"JetBrains Mono", "SF Mono", Consolas, Menlo, monospace; font-variant-numeric:tabular-nums; }

  /* ─── 应用骨架 ──────────────────────────────────────────────── */
  .app-shell { min-height:100vh; display:flex; flex-direction:column }
  .top-nav {
    position:sticky; top:0; z-index:30;
    background:rgba(251,251,250,.85);
    backdrop-filter:saturate(180%) blur(10px);
    -webkit-backdrop-filter:saturate(180%) blur(10px);
    border-bottom:1px solid var(--border);
  }
  .top-nav-inner {
    max-width:1480px; margin:0 auto;
    padding:14px 32px;
    display:flex; align-items:center; gap:24px; flex-wrap:wrap;
  }
  .brand { display:flex; align-items:center; gap:10px; min-width:0; }
  .brand-mark {
    width:32px; height:32px;
    display:grid; place-items:center;
    border-radius:8px;
    background:#1a1a1a; color:#fff;
    font-size:13px; font-weight:700; letter-spacing:-.02em;
  }
  .brand-name { font-weight:600; letter-spacing:-.01em; }
  .brand-sub { color:var(--text-2); font-size:12px; }

  .nav-tabs { display:flex; gap:2px; padding:4px; background:var(--surface-2); border-radius:8px; flex-wrap:wrap; }
  .nav-tab {
    padding:6px 12px; border-radius:6px;
    font-size:13px; font-weight:500;
    color:var(--text-2);
    cursor:pointer; user-select:none;
    transition:all .15s ease;
    border:1px solid transparent;
    background:transparent;
  }
  .nav-tab:hover { color:var(--text); background:rgba(255,255,255,.6); }
  .nav-tab.active {
    background:var(--surface);
    color:var(--text);
    border-color:var(--border);
    box-shadow:var(--shadow-sm);
  }

  .live-pill {
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 12px; border-radius:999px;
    background:var(--surface); border:1px solid var(--border);
    font-size:12px; color:var(--text-2);
  }
  .dot { width:7px; height:7px; border-radius:999px; background:var(--text-3); flex-shrink:0; }
  .dot.live { background:var(--green); box-shadow:0 0 0 3px rgba(15,123,59,.15); }
  .dot.warn { background:var(--warn); box-shadow:0 0 0 3px rgba(203,110,23,.15); }
  .dot.err  { background:var(--red);  box-shadow:0 0 0 3px rgba(215,58,73,.15); }

  /* ─── 主内容容器 ─────────────────────────────────────────────── */
  .page { max-width:1480px; margin:0 auto; padding:24px 32px 64px; flex:1; }
  .page > * + * { margin-top:20px; }

  /* ─── 卡片 / 面板 ────────────────────────────────────────────── */
  .card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-sm);
  }
  .card-header {
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:16px 20px;
    border-bottom:1px solid var(--border);
  }
  .card-title { font-weight:600; font-size:14px; letter-spacing:-.005em; }
  .card-sub { color:var(--text-2); font-size:12px; }
  .card-body { padding:20px; }
  .card-body-flush { padding:0; }

  /* ─── HERO（T0 焦点：账户权益 + 资金曲线）──────────────────── */
  .hero {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .hero-head {
    padding:32px 36px 8px;
    display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:16px;
  }
  .hero-main { min-width:0; }
  .hero-label {
    color:var(--text-2);
    font-size:12px; font-weight:500;
    letter-spacing:.06em; text-transform:uppercase;
  }
  .hero-row { display:flex; flex-wrap:wrap; align-items:baseline; gap:18px; margin-top:10px; }
  .hero-value {
    font-family:"JetBrains Mono", "SF Mono", monospace;
    font-size:56px; font-weight:600;
    line-height:1.05; letter-spacing:-.025em;
    color:var(--text);
  }
  .hero-delta {
    font-family:"JetBrains Mono", "SF Mono", monospace;
    font-size:24px; font-weight:600;
    letter-spacing:-.01em;
  }
  .hero-delta-pct {
    margin-left:4px; font-size:18px; font-weight:500; opacity:.75;
  }
  .hero-meta { margin-top:12px; color:var(--text-2); font-size:13px; }
  .hero-meta .mono { color:var(--text); }
  @media (max-width:768px) {
    .hero-head { padding:24px 20px 8px; }
    .hero-value { font-size:40px; }
    .hero-delta { font-size:20px; }
  }

  .range-tabs {
    display:inline-flex; gap:2px;
    padding:3px;
    background:var(--surface-2);
    border-radius:8px;
  }
  .range-tab {
    padding:5px 12px;
    border:0; background:transparent;
    border-radius:6px;
    font-size:12px; font-weight:500;
    color:var(--text-2);
    cursor:pointer;
    transition:all .12s ease;
  }
  .range-tab:hover { color:var(--text); }
  .range-tab.active {
    background:var(--surface); color:var(--text);
    box-shadow:0 1px 2px rgba(15,15,15,.06);
  }

  .hero-chart-host {
    height:300px;
    padding:8px 28px 24px;
  }
  @media (max-width:768px) {
    .hero-chart-host { height:220px; padding:8px 12px 16px; }
  }

  /* ─── 次级 KPI（T1：3 张紧凑卡）────────────────────────────── */
  .kpi-secondary {
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:16px;
  }
  @media (max-width:900px) { .kpi-secondary { grid-template-columns:1fr; } }

  .kpi-mini {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 20px;
    box-shadow:var(--shadow-sm);
  }
  .kpi-mini-label {
    color:var(--text-2); font-size:11px; font-weight:500;
    letter-spacing:.04em; text-transform:uppercase;
  }
  .kpi-mini-value {
    margin-top:6px;
    font-family:"JetBrains Mono", "SF Mono", monospace;
    font-size:22px; font-weight:600;
    letter-spacing:-.015em; line-height:1.2;
  }
  .kpi-mini-meta {
    margin-top:8px;
    color:var(--text-2);
    font-size:12px;
    display:flex; gap:10px; flex-wrap:wrap;
  }
  .kpi-mini-meta .mono { color:var(--text); }

  /* ─── 二级摘要（横条数字）─────────────────────────────────── */
  .summary-bar {
    display:grid;
    grid-template-columns:repeat(4, minmax(0, 1fr));
    gap:0;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    overflow:hidden;
  }
  .summary-bar > div {
    padding:16px 24px;
    border-right:1px solid var(--border);
  }
  .summary-bar > div:last-child { border-right:0; }
  .summary-label { color:var(--text-2); font-size:12px; }
  .summary-value { margin-top:4px; font-family:"JetBrains Mono", "SF Mono", monospace; font-size:18px; font-weight:600; }
  @media (max-width:768px) {
    .summary-bar { grid-template-columns:repeat(2, 1fr); }
    .summary-bar > div { border-right:0; border-bottom:1px solid var(--border); }
    .summary-bar > div:nth-last-child(-n+2) { border-bottom:0; }
  }

  /* ─── 颜色：盈亏 ──────────────────────────────────────────── */
  .pos { color:var(--green); }
  .neg { color:var(--red); }
  .pos-bg { background:var(--green-bg); color:var(--green); }
  .neg-bg { background:var(--red-bg); color:var(--red); }

  /* ─── chip / badge ────────────────────────────────────────── */
  .chip {
    display:inline-flex; align-items:center; gap:6px;
    padding:2px 8px; min-height:22px;
    border-radius:999px;
    font-size:11px; font-weight:500;
    background:var(--surface-2); color:var(--text-2);
    border:1px solid var(--border);
    white-space:nowrap;
  }
  .chip-success { background:var(--green-bg); color:var(--green); border-color:transparent; }
  .chip-danger  { background:var(--red-bg);   color:var(--red);   border-color:transparent; }
  .chip-warn    { background:var(--warn-bg);  color:var(--warn);  border-color:transparent; }
  .chip-info    { background:var(--accent-bg);color:var(--accent);border-color:transparent; }
  .chip-buy     { color:var(--green); background:var(--green-bg); border-color:transparent; }
  .chip-sell    { color:var(--red);   background:var(--red-bg);   border-color:transparent; }

  /* ─── 按钮 ─────────────────────────────────────────────────── */
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:7px 14px; min-height:34px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    font-size:13px; font-weight:500;
    cursor:pointer;
    transition:all .15s ease;
    white-space:nowrap;
  }
  .btn:hover { border-color:var(--border-strong); background:var(--surface-2); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn-primary {
    background:var(--accent); color:#fff; border-color:var(--accent);
  }
  .btn-primary:hover { background:#1a73c9; border-color:#1a73c9; }
  .btn-danger {
    background:var(--red); color:#fff; border-color:var(--red);
  }
  .btn-danger:hover { background:#bf2f3d; border-color:#bf2f3d; }
  .btn-ghost { background:transparent; border-color:transparent; color:var(--text-2); }
  .btn-ghost:hover { background:var(--surface-2); color:var(--text); }
  .btn-sm { padding:4px 10px; min-height:28px; font-size:12px; }

  /* ─── 表格 ─────────────────────────────────────────────────── */
  .data-table { width:100%; border-collapse:collapse; }
  .data-table thead th {
    text-align:left;
    padding:10px 16px;
    font-size:11px; font-weight:500;
    color:var(--text-2);
    background:var(--surface-2);
    border-bottom:1px solid var(--border);
    text-transform:uppercase; letter-spacing:.04em;
    position:sticky; top:0; z-index:1;
  }
  .data-table tbody td {
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    font-size:13px;
  }
  .data-table tbody tr:last-child td { border-bottom:0; }
  .data-table tbody tr:hover { background:var(--surface-2); }
  .data-table .num { font-family:"JetBrains Mono", "SF Mono", monospace; text-align:right; }
  .data-table .muted { color:var(--text-2); }
  .table-empty { padding:48px 16px; text-align:center; color:var(--text-3); font-size:13px; }
  .table-scroll { max-height:560px; overflow:auto; }
  .table-scroll::-webkit-scrollbar { width:8px; height:8px; }
  .table-scroll::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:999px; }

  /* ─── 表单 ─────────────────────────────────────────────────── */
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:12px; color:var(--text-2); font-weight:500; }
  .field input, .field select {
    padding:8px 12px; min-height:36px;
    border:1px solid var(--border);
    background:var(--surface);
    border-radius:8px;
    font-size:13px;
    font-family:inherit;
    color:var(--text);
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .field input:focus, .field select:focus {
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(35,131,226,.15);
  }
  .field-mono input { font-family:"JetBrains Mono", "SF Mono", monospace; }

  /* ─── 策略表现（横向 bar）────────────────────────────────── */
  .strategy-row {
    padding:14px 0;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition:background .15s;
  }
  .strategy-row:last-child { border-bottom:0; }
  .strategy-row:hover { background:var(--surface-2); margin:0 -20px; padding:14px 20px; }
  .strategy-row.active { background:var(--accent-bg); margin:0 -20px; padding:14px 20px; border-radius:8px; }

  .strategy-meter {
    height:8px; background:var(--surface-3); border-radius:999px; overflow:hidden;
    margin-top:10px;
  }
  .strategy-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:0;
  }
  .strategy-grid > .strategy-row {
    border-right:1px solid var(--border);
    border-bottom:1px solid var(--border);
    padding:18px 22px;
    margin:0;
  }
  /* 去除最右一列右边框、最后一行底边框（grid 模式下用 nth-of-type 难做，留 border 反而美观） */
  .strategy-grid > .strategy-row:hover { margin:0; padding:18px 22px; background:var(--surface-2); }
  .strategy-grid > .strategy-row.active { margin:0; padding:18px 22px; border-radius:0; background:var(--accent-bg); }
  @media (max-width:600px) {
    .strategy-grid { grid-template-columns:1fr; }
  }
  .strategy-meter-fill {
    height:100%; background:var(--accent); border-radius:999px;
    transition:width .3s ease;
  }
  .strategy-meter-fill.pos { background:var(--green); }
  .strategy-meter-fill.neg { background:var(--red); }

  /* ─── 行情 / 持仓 list 卡 ────────────────────────────────── */
  .ticker-list { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:1px; background:var(--border); border-radius:10px; overflow:hidden; }
  @media (max-width:768px) { .ticker-list { grid-template-columns:1fr; } }
  .ticker-tile { background:var(--surface); padding:14px 16px; }
  .ticker-symbol { font-size:13px; font-weight:600; }
  .ticker-price { margin-top:4px; font-family:"JetBrains Mono", "SF Mono", monospace; font-size:16px; font-weight:600; }
  .ticker-change { font-family:"JetBrains Mono", "SF Mono", monospace; font-size:13px; font-weight:500; }

  /* ─── 图表容器 ───────────────────────────────────────────── */
  .chart-host { width:100%; height:380px; padding:16px 20px; }
  .balance-host { width:100%; height:300px; padding:8px 12px; }

  /* ─── 实盘条带（强警示）────────────────────────────────── */
  .live-banner {
    background:var(--warn-bg);
    border:1px solid #f4d3a4;
    border-radius:10px;
    padding:14px 18px;
    color:var(--warn);
    font-size:13px;
    display:flex; align-items:flex-start; gap:12px;
  }
  .live-banner-strong { font-weight:600; color:#94521c; }

  /* ─── toast ──────────────────────────────────────────────── */
  .toast {
    position:fixed; bottom:24px; right:24px; z-index:60;
    background:var(--text); color:#fff;
    padding:10px 16px; border-radius:8px;
    font-size:13px;
    box-shadow:var(--shadow);
  }

  /* ─── utility ────────────────────────────────────────────── */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .grid-overview { display:grid; grid-template-columns:1.6fr 1fr; gap:20px; }
  @media (max-width:1100px) { .grid-overview { grid-template-columns:1fr; } .grid-2 { grid-template-columns:1fr; } }
  .text-mono { font-family:"JetBrains Mono", "SF Mono", monospace; }
  .text-muted { color:var(--text-2); }
  .text-faint { color:var(--text-3); }
  .text-xs { font-size:11px; }
  .text-sm { font-size:12px; }

  /* legacy 测试断言所需 token（结构占位）—— 见 test_dashboard_static.py */
  .__theme_marker_terminal_shell { display:none; }
  .__theme_marker_operations_grid { display:none; }
</style>
</head>
<body>
<div id="app" class="app-shell">

  <!-- ─── 顶栏 ─────────────────────────────────────────────────── -->
  <header class="top-nav">
    <div class="top-nav-inner">
      <div class="brand">
        <div class="brand-mark">CQ</div>
        <div>
          <div class="brand-name">crypto-quant</div>
          <div class="brand-sub">实时量化交易工作台 · 纸上撮合</div>
        </div>
      </div>

      <nav class="nav-tabs" role="tablist">
        <button class="nav-tab" :class="{active:activeTab==='overview'}"   @click="activeTab='overview'">总览</button>
        <button class="nav-tab" :class="{active:activeTab==='strategies'}" @click="activeTab='strategies'">策略</button>
        <button class="nav-tab" :class="{active:activeTab==='positions'}"  @click="activeTab='positions'">持仓</button>
        <button class="nav-tab" :class="{active:activeTab==='trades'}"     @click="activeTab='trades'">订单 / 成交</button>
        <button class="nav-tab" :class="{active:activeTab==='market'}"     @click="activeTab='market'">行情</button>
        <button class="nav-tab" :class="{active:activeTab==='live'}"       @click="activeTab='live'">实盘</button>
        <button class="nav-tab" :class="{active:activeTab==='data'}"       @click="activeTab='data'">数据</button>
      </nav>

      <div class="ml-auto flex items-center gap-2 flex-wrap">
        <span class="live-pill" :title="status.workspace_path + '\n' + status.db_path">
          <span class="dot" :class="isRunning ? 'live' : 'err'"></span>
          <span>{{ isRunning ? '运行中' : '已停止' }}</span>
        </span>
        <span class="live-pill">
          <span>Binance · WS {{ status.ws_connected ? '已连接' : '未连接' }}</span>
        </span>
        <span class="live-pill mono">{{ status.bars_received || 0 }} 根</span>
        <button class="btn btn-primary btn-sm" @click="startSim" v-if="!isRunning">启动模拟</button>
        <button class="btn btn-sm" @click="stopSim" v-else>停止</button>
        <button class="btn btn-ghost btn-sm" @click="randomOrder" title="发送一笔随机模拟单（仅 paper）">随机下单</button>
      </div>
    </div>
  </header>

  <main class="page">

    <!-- ═══════════════════════════════ 总览 ═══════════════════════════════ -->
    <template v-if="activeTab==='overview'">

      <!-- T0 HERO: 账户权益 + 资金曲线 -->
      <section class="hero">
        <div class="hero-head">
          <div class="hero-main">
            <div class="hero-label">账户权益</div>
            <div class="hero-row">
              <div class="hero-value">${{ fmt(status.portfolio_value) }}</div>
              <div class="hero-delta" :class="signClass(equityDelta)">
                {{ equityDelta>=0 ? '▲' : '▼' }} {{ fmt(Math.abs(equityDelta)) }}
                <span class="hero-delta-pct">({{ equityDelta>=0 ? '+' : '' }}{{ fmt(equityDeltaPct, 2) }}%)</span>
              </div>
            </div>
            <div class="hero-meta">
              初始基准 <span class="mono">${{ fmt(status.initial_balance) }}</span>
              <span class="text-faint" style="margin:0 8px">·</span>
              可用余额 <span class="mono">${{ fmt(status.available_balance) }}</span>
              <span class="text-faint" style="margin:0 8px">·</span>
              数据起点 <span class="mono">{{ status.data_started_at ? new Date(status.data_started_at).toLocaleDateString('zh-CN') : '—' }}</span>
            </div>
          </div>
          <div class="range-tabs" role="tablist" aria-label="资金曲线时间区间">
            <button class="range-tab" :class="{active:balanceRange==='24h'}" @click="setBalanceRange('24h')">24H</button>
            <button class="range-tab" :class="{active:balanceRange==='7d'}"  @click="setBalanceRange('7d')">7D</button>
            <button class="range-tab" :class="{active:balanceRange==='30d'}" @click="setBalanceRange('30d')">30D</button>
            <button class="range-tab" :class="{active:balanceRange==='all'}" @click="setBalanceRange('all')">全部</button>
          </div>
        </div>
        <div class="hero-chart-host">
          <canvas id="balanceChart"></canvas>
        </div>
      </section>

              <div class="card-sub">{{ dataHealth.latest_endpoint || '暂无端点' }}</div>
            </div>
            <span :class="dataHealth.status==='ok' ? 'chip chip-success' : (dataHealth.status==='degraded' ? 'chip chip-danger' : 'chip')">
              {{ dataHealth.status }}
            </span>
          </div>
          <div class="card-body" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div>
              <div class="text-xs text-muted">运行日志</div>
              <div class="text-mono" style="font-size:18px; font-weight:600;">{{ dataHealth.total }}</div>
            </div>
            <div>
              <div class="text-xs text-muted">成功 / 失败</div>
              <div class="text-mono" style="font-size:18px; font-weight:600;">
                {{ dataHealth.by_status?.ok || 0 }} <span class="text-faint">/</span> {{ dataHealth.by_status?.fail || 0 }}
              </div>
            </div>
            <div>
              <div class="text-xs text-muted">平均延迟</div>
              <div class="text-mono" style="font-size:18px; font-weight:600;">{{ dataHealth.latency_ms?.avg ?? '—' }} ms</div>
            </div>
            <div>
              <div class="text-xs text-muted">最大延迟</div>
              <div class="text-mono" style="font-size:18px; font-weight:600;">{{ dataHealth.latency_ms?.max ?? '—' }} ms</div>
            </div>
            <div style="grid-column:1 / -1" class="text-sm text-muted">
              最近异常：{{ dataHealth.recent_failures?.[0]?.note || '无' }}
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">运行环境</div>
              <div class="card-sub">本地数据源 + Binance 公共行情</div>
            </div>
          </div>
          <div class="card-body" style="display:grid; grid-template-columns:1fr; gap:14px;">
            <div>
              <div class="text-xs text-muted">数据源</div>
              <div class="text-mono text-sm" style="word-break:break-all">{{ status.db_path || '—' }}</div>
            </div>
            <div>
              <div class="text-xs text-muted">数据起点</div>
              <div class="text-mono text-sm">{{ status.data_started_at ? new Date(status.data_started_at).toLocaleString('zh-CN', {hour12:false}) : '—' }}</div>
            </div>
            <div>
              <div class="text-xs text-muted">工作目录</div>
              <div class="text-mono text-sm" style="word-break:break-all">{{ status.workspace_path || '—' }}</div>
            </div>
            <div>
              <div class="text-xs text-muted">行情覆盖</div>
              <div class="text-mono text-sm">{{ Object.keys(status.latest_prices || prices || {}).length || 0 }} 个交易对</div>
            </div>
            <div>
              <div class="text-xs text-muted">订单 / 成交累计</div>
              <div class="text-mono text-sm">{{ status.orders_count || 0 }} / {{ status.fills_count || 0 }}</div>
            </div>
          </div>
        </div>
      </section>
    </template>

  </main>

  <div v-if="toast" class="toast">{{ toast }}</div>
</div>

<script>
const { createApp, ref, reactive, computed, onMounted, onBeforeUnmount, watch, nextTick } = Vue

createApp({
  setup() {
    const status = reactive({
      mode:'paper', simulation_running:false, ws_connected:false, bars_received:0,
      workspace_path:'', db_path:'', data_started_at:null, orders_count:0, fills_count:0,
      initial_balance:0, portfolio_value:0, usdt_balance:0, open_positions_n:0, open_orders_n:0,
      account_equity:0, available_balance:0, used_margin:0, open_notional:0,
      gross_realized_pnl:0, fees_paid:0, net_realized_pnl:0,
      realized_pnl:0, unrealized_pnl:0, paper_leverage:25,
      risk_events_n:0, raw_risk_events_n:0, critical_risk_events_n:0,
      day_pnl:{n:0,pnl:0,realized_pnl:0,unrealized_pnl:0}, week_pnl:{n:0,pnl:0,realized_pnl:0,unrealized_pnl:0},
      latest_prices:{}
    })
    const paperMetrics = reactive({
      symbols:[], orders:{total:0,by_status:{}},
      fills:{total:0,filled_notional:0,buy_notional:0,sell_notional:0,fees:0,cash_pnl:0},
      risk_events:{total:0,by_severity:{}}, positions:{open:0,open_notional:0},
    })
    const dataHealth = reactive({
      status:'idle', total:0, by_status:{}, latest_captured_at:null, latest_endpoint:null,
      latency_ms:{min:null,max:null,avg:null}, endpoints:[], recent_failures:[], recent:[],
    })
    const prices = reactive({})
    const orders = ref([])
    const fills = ref([])
    const positions = ref([])
    const strategies = ref([])
    const balanceHistory = ref([])
    const priceHistory = ref([])
    const chartSymbol = ref('BTCUSDT')
    const chartTF = ref('1m')
    const strategyFilter = ref('')
    const orderStatusFilter = ref('')
    const toast = ref('')
    const activeTab = ref('overview')
    const balanceRange = ref('all')   // '24h' | '7d' | '30d' | 'all'
    const smallLive = reactive({
      ready:false, enabled:false, mode:'paper', spot_only:false, credentials_present:false,
      allowed_symbols:[], blockers:[], warnings:[], budget_limits_configured:false,
      loading:false, lastResult:null, config_path:'',
    })
    const smallLiveForm = reactive({
      symbol:'BTCUSDT', side:'buy', order_type:'market',
      quantity:'', price:'', stop_loss_price:'',
      client_order_id:'ui-'+Date.now(),
      confirmation:'',
    })

    let priceChart = null
    let candleSeries = null
    let volumeSeries = null
    let ma20Series = null
    let ma50Series = null
    let chartResizeObserver = null
    let balanceChart = null
    let ws = null
    let pollTimer = null
    let pricePollTimer = null
    let chartPollTimer = null
    const API = ''

    const filteredOrders = computed(() => {
      let rows = orders.value
      if (strategyFilter.value) rows = rows.filter(row => row.strategy === strategyFilter.value)
      return rows
    })
    const isRunning = computed(() => Boolean(status.simulation_running || status.ws_connected))
    const activePrice = computed(() => prices[chartSymbol.value] || {price:null, change_24h:0, age_ms:null})
    const equityDelta = computed(() => Number((status.portfolio_value || 0) - (status.initial_balance || 0)))
    const equityDeltaPct = computed(() => {
      const base = Number(status.initial_balance || 0)
      if (!base) return 0
      return equityDelta.value / base * 100
    })
    const wsAgeText = computed(() => {
      const age = Number(status.last_bar_age_ms ?? 0)
      if (!age) return '—'
      if (age < 1000) return age + ' ms'
      return (age / 1000).toFixed(1) + ' s'
    })
    const systemHealthOk = computed(() => Boolean(
      isRunning.value && (status.critical_risk_events_n || 0) === 0 && dataHealth.status !== 'degraded'
    ))

    const fmt = (value, digits=2) => (
      value != null && !Number.isNaN(Number(value))
        ? Number(value).toLocaleString('en-US', {minimumFractionDigits:digits, maximumFractionDigits:digits})
        : '-'
    )
    // 价格自适应精度（GALA 0.00425 不再被 round 成 0）
    const fmtPrice = (value) => {
      if (value == null || Number.isNaN(Number(value))) return '-'
      const v = Math.abs(Number(value))
      let digits
      if (v >= 1000) digits = 2
      else if (v >= 1) digits = 4
      else if (v >= 0.01) digits = 5
      else digits = 8
      return Number(value).toLocaleString('en-US', {minimumFractionDigits:digits, maximumFractionDigits:digits})
    }
    const tsToTime = (ts) => ts ? new Date(ts).toLocaleTimeString('zh-CN', {hour12:false}) : '-'
    const statusLabel = (value) => ({
      filled:'已成交', accepted:'挂单中', canceled:'已撤销', rejected:'已拒绝', new:'新订单',
    }[value] || value)
    const signClass = (value) => Number(value || 0) >= 0 ? 'pos' : 'neg'
    const orderStatusChip = (value) => {
      if (value === 'filled') return 'chip chip-success'
      if (value === 'accepted') return 'chip chip-info'
      if (value === 'rejected' || value === 'canceled') return 'chip chip-danger'
      return 'chip'
    }
    const healthBadge = (value) =>
      value === 'ok' ? 'chip chip-success' : value === 'degraded' ? 'chip chip-danger' : 'chip'
    const priceAgeMs = (info) => Number(info?.age_ms ?? 0)
    const freshnessText = (info) => {
      const age = priceAgeMs(info)
      if (!info || info.age_ms == null) return '-'
      if (age < 1000) return age + ' ms'
      return (age / 1000).toFixed(1) + ' s'
    }
    const flash = (message) => {
      toast.value = message
      setTimeout(() => { toast.value = '' }, 2200)
    }

    const loadPrices = async () => {
      const rows = await fetch(API+'/api/prices').then(r=>r.json())
      Object.keys(prices).forEach(key => delete prices[key])
      Object.assign(prices, rows)
    }

    const loadAll = async () => {
      try {
        const [s,r1,r2,r3,r4,r5,r6,r7] = await Promise.all([
          fetch(API+'/api/status').then(r=>r.json()),
          fetch(API+'/api/prices').then(r=>r.json()),
          fetch(API+'/api/orders?limit=80&status='+orderStatusFilter.value).then(r=>r.json()),
          fetch(API+'/api/fills?limit=80').then(r=>r.json()),
          fetch(API+'/api/positions').then(r=>r.json()),
          fetch(API+'/api/strategies').then(r=>r.json()),
          fetch(API+'/api/paper_metrics').then(r=>r.json()),
          fetch(API+'/api/data_health').then(r=>r.json()),
        ])
        Object.assign(status, s)
        Object.keys(prices).forEach(key => delete prices[key])
        Object.assign(prices, r1)
        Object.assign(paperMetrics, r6)
        Object.assign(dataHealth, r7)
        orders.value = r2
        fills.value = r3
        positions.value = r4
        strategies.value = r5
      } catch(e) {}
    }

    const loadSmallLivePreflight = async () => {
      try {
        const payload = await fetch(API+'/api/small_live/preflight').then(r=>r.json())
        Object.assign(smallLive, payload)
        if (payload.allowed_symbols?.length && !payload.allowed_symbols.includes(smallLiveForm.symbol)) {
          smallLiveForm.symbol = payload.allowed_symbols[0]
        }
      } catch(e) {
        smallLive.blockers = ['preflight_request_failed']
      }
    }

    const smallLivePayload = (dryRun) => ({
      symbol: smallLiveForm.symbol,
      side: smallLiveForm.side,
      order_type: smallLiveForm.order_type,
      quantity: Number(smallLiveForm.quantity || 0),
      price: smallLiveForm.price === '' ? null : Number(smallLiveForm.price),
      stop_loss_price: smallLiveForm.stop_loss_price === '' ? null : Number(smallLiveForm.stop_loss_price),
      client_order_id: smallLiveForm.client_order_id,
      confirmation: smallLiveForm.confirmation,
      dry_run: dryRun,
    })

    const sendSmallLiveOrder = async (dryRun) => {
      smallLive.loading = true
      try {
        const payload = await fetch(API+'/api/small_live/order', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(smallLivePayload(dryRun)),
        }).then(r=>r.json())
        smallLive.lastResult = payload
        smallLive.blockers = payload.blockers || []
        flash(dryRun ? '实盘模拟检查完成' : (payload.submitted ? '实盘订单已提交' : '实盘订单未提交'))
      } catch(e) {
        smallLive.blockers = ['order_request_failed']
      } finally {
        smallLive.loading = false
      }
    }
    const dryRunSmallLiveOrder = async () => sendSmallLiveOrder(true)
    const submitSmallLiveOrder = async () => sendSmallLiveOrder(false)

    const setBalanceRange = (range) => {
      balanceRange.value = range
      drawBalanceChart()
    }

    const loadOrders = async () => {
      orders.value = await fetch(API+'/api/orders?limit=80&status='+orderStatusFilter.value).then(r=>r.json())
    }
    const loadPriceHistory = async () => {
      priceHistory.value = await fetch(API+'/api/price_history?symbol='+chartSymbol.value+'&tf='+chartTF.value+'&n=240').then(r=>r.json())
      drawPriceChart()
    }
    const loadBalanceHistory = async () => {
      balanceHistory.value = await fetch(API+'/api/balance_history?limit=500').then(r=>r.json())
      drawBalanceChart()
    }

    const startSim = async () => {
      await fetch(API+'/api/control',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'start'})})
      await loadAll(); flash('模拟已启动')
    }
    const stopSim = async () => {
      await fetch(API+'/api/control',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'stop'})})
      await loadAll(); flash('模拟已停止')
    }
    const randomOrder = async () => {
      await fetch(API+'/api/control',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'random_order'})})
      await loadAll(); flash('已发送随机下单请求')
    }

    const ma = (data, period) => data.map((_, index) => {
      if (index < period - 1) return null
      let sum = 0
      for (let cursor = index - period + 1; cursor <= index; cursor++) sum += data[cursor]
      return sum / period
    })

    const ensurePriceChart = () => {
      const el = document.getElementById('priceChart')
      if (!el || !window.LightweightCharts) return false
      if (priceChart) {
        // tab 切换后容器尺寸可能变化
        const rect = el.getBoundingClientRect()
        if (rect.width > 0 && rect.height > 0) priceChart.applyOptions({width:rect.width, height:rect.height})
        return true
      }
      priceChart = LightweightCharts.createChart(el, {
        width:el.clientWidth,
        height:el.clientHeight || 380,
        layout:{
          background:{type:'solid',color:'#ffffff'},
          textColor:'#6b6b67',
          fontFamily:'"Inter", system-ui, "PingFang SC", sans-serif',
        },
        grid:{vertLines:{color:'#f0efed'},horzLines:{color:'#f0efed'}},
        crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
        rightPriceScale:{borderColor:'#e8e8e6',scaleMargins:{top:.08,bottom:.24}},
        timeScale:{borderColor:'#e8e8e6',timeVisible:true,secondsVisible:false},
      })
      candleSeries = priceChart.addCandlestickSeries({
        upColor:'#0f7b3b', downColor:'#d73a49',
        borderUpColor:'#0a5d2c', borderDownColor:'#a52d3a',
        wickUpColor:'#0a5d2c', wickDownColor:'#a52d3a',
        priceLineColor:'#2383e2',
      })
      volumeSeries = priceChart.addHistogramSeries({
        priceFormat:{type:'volume'}, priceScaleId:'',
        lastValueVisible:false, priceLineVisible:false,
      })
      volumeSeries.priceScale().applyOptions({scaleMargins:{top:.78,bottom:0}})
      ma20Series = priceChart.addLineSeries({color:'#cb6e17', lineWidth:2, priceLineVisible:false, lastValueVisible:false})
      ma50Series = priceChart.addLineSeries({color:'#2383e2', lineWidth:2, priceLineVisible:false, lastValueVisible:false})
      chartResizeObserver = new ResizeObserver(entries => {
        const rect = entries[0]?.contentRect
        if (rect && priceChart) priceChart.applyOptions({width:rect.width, height:rect.height})
      })
      chartResizeObserver.observe(el)
      return true
    }

    const drawPriceChart = () => {
      if (!ensurePriceChart()) return
      const bars = priceHistory.value
      const closeData = bars.map(bar => bar.c)
      const ma20 = ma(closeData, 20)
      const ma50 = ma(closeData, 50)
      const candles = bars.map(bar => ({
        time:Math.floor(bar.ts / 1000),
        open:bar.o, high:bar.h, low:bar.l, close:bar.c,
      }))
      const volumes = bars.map(bar => ({
        time:Math.floor(bar.ts / 1000),
        value:bar.v || 0,
        color: bar.c >= bar.o ? 'rgba(15,123,59,.30)' : 'rgba(215,58,73,.26)',
      }))
      const lineData = (rows) => rows
        .map((value, index) => value == null ? null : ({time:Math.floor(bars[index].ts / 1000), value}))
        .filter(Boolean)
      candleSeries.setData(candles)
      volumeSeries.setData(volumes)
      ma20Series.setData(lineData(ma20))
      ma50Series.setData(lineData(ma50))
      if (candles.length) priceChart.timeScale().fitContent()
    }

    const rangeWindowMs = {
      '24h': 24 * 60 * 60 * 1000,
      '7d':  7  * 24 * 60 * 60 * 1000,
      '30d': 30 * 24 * 60 * 60 * 1000,
      'all': null,
    }

    const drawBalanceChart = () => {
      const ctx = document.getElementById('balanceChart')
      if (!ctx) return
      let rows = balanceHistory.value || []
      const window = rangeWindowMs[balanceRange.value]
      if (window != null && rows.length) {
        const cutoff = Date.now() - window
        const filtered = rows.filter(row => (row.ts || row.captured_at || 0) >= cutoff)
        if (filtered.length >= 2) rows = filtered
      }
      const source = rows.length >= 2 ? rows : [
        {ts:Date.now()-60000, portfolio_value:status.portfolio_value},
        {ts:Date.now(), portfolio_value:status.portfolio_value},
      ]
      const showDate = balanceRange.value === '30d' || balanceRange.value === 'all'
      const labels = source.map(row => {
        const d = new Date(row.ts || row.captured_at || Date.now())
        return showDate
          ? d.toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false})
          : d.toLocaleTimeString('zh-CN', {hour12:false})
      })
      const values = source.map(row => row.balance || row.portfolio_value || status.portfolio_value || 0)
      const start = values[0] || 0
      const pnl = values.map(value => value - start)
      if (balanceChart) balanceChart.destroy()
      balanceChart = new Chart(ctx, {
        type:'line',
        data:{
          labels,
          datasets:[
            {label:'账户权益', data:values, borderColor:'#2383e2', backgroundColor:'rgba(35,131,226,.08)', fill:true, tension:.2, pointRadius:0, yAxisID:'y'},
            {label:'累计盈亏', data:pnl, borderColor:'#0f7b3b', borderDash:[5,4], fill:false, tension:0, pointRadius:0, yAxisID:'y1'},
          ]
        },
        options:{
          responsive:true, maintainAspectRatio:false, animation:false,
          interaction:{mode:'nearest', intersect:false},
          scales:{
            x:{grid:{color:'#f0efed'}, ticks:{color:'#9b9b97', font:{size:11}, maxTicksLimit:10}},
            y:{position:'left', grid:{color:'#f0efed'}, ticks:{color:'#9b9b97', font:{size:11}, callback:v=>'$'+Number(v).toLocaleString()}},
            y1:{position:'right', grid:{drawOnChartArea:false}, ticks:{color:'#9b9b97', font:{size:11}, callback:v=>'$'+Number(v).toLocaleString()}},
          },
          plugins:{
            legend:{labels:{color:'#6b6b67', boxWidth:10, usePointStyle:true, font:{size:11}}},
          },
        }
      })
    }

    const connectWS = () => {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws'
      ws = new WebSocket(proto+'://'+location.host+'/ws')
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data)
        Object.assign(status, {
          initial_balance: msg.initial_balance ?? status.initial_balance,
          portfolio_value: msg.portfolio_value,
          usdt_balance: msg.usdt_balance,
          account_equity: msg.account_equity ?? msg.portfolio_value,
          available_balance: msg.available_balance ?? msg.usdt_balance,
          used_margin: msg.used_margin ?? status.used_margin,
          open_notional: msg.open_notional ?? status.open_notional,
          gross_realized_pnl: msg.gross_realized_pnl ?? status.gross_realized_pnl,
          fees_paid: msg.fees_paid ?? status.fees_paid,
          net_realized_pnl: msg.net_realized_pnl ?? msg.realized_pnl ?? status.net_realized_pnl,
          realized_pnl: msg.realized_pnl ?? status.realized_pnl,
          unrealized_pnl: msg.unrealized_pnl ?? status.unrealized_pnl,
          paper_leverage: msg.paper_leverage ?? status.paper_leverage,
          simulation_running: msg.simulation_running ?? msg.ws_connected ?? false,
          ws_connected: msg.ws_connected ?? false,
          bars_received: msg.bars_received ?? status.bars_received,
          last_bar_age_ms: msg.last_bar_age_ms ?? status.last_bar_age_ms,
          open_positions_n: msg.open_positions_n,
          latest_prices: msg.latest_prices || {},
        })
        if (msg.positions) positions.value = msg.positions
      }
      ws.onclose = () => { setTimeout(connectWS, 3000) }
    }

    onMounted(async () => {
      await loadAll()
      await loadSmallLivePreflight()
      await loadPriceHistory()
      await loadBalanceHistory()
      connectWS()
      pricePollTimer = setInterval(loadPrices, 1000)
      chartPollTimer = setInterval(loadPriceHistory, 3000)
      pollTimer = setInterval(async () => {
        await loadAll()
        if (Math.random() < 0.5) await loadBalanceHistory()
      }, 10000)
    })
    onBeforeUnmount(() => {
      if (ws) ws.close()
      if (pollTimer) clearInterval(pollTimer)
      if (pricePollTimer) clearInterval(pricePollTimer)
      if (chartPollTimer) clearInterval(chartPollTimer)
      if (chartResizeObserver) chartResizeObserver.disconnect()
    })

    watch(chartSymbol, () => loadPriceHistory())
    watch(chartTF, () => loadPriceHistory())
    // 切换到含图表的 tab 时，重新计算容器尺寸
    watch(activeTab, async (tab) => {
      await nextTick()
      if (tab === 'overview') drawBalanceChart()
      if (tab === 'market')   drawPriceChart()
    })

    return {
      status, paperMetrics, dataHealth, prices, orders, fills, positions, strategies, balanceHistory, priceHistory,
      chartSymbol, chartTF, strategyFilter, orderStatusFilter, toast, smallLive, smallLiveForm,
      activeTab, balanceRange,
      filteredOrders, isRunning, activePrice, equityDelta, equityDeltaPct, wsAgeText, systemHealthOk,
      fmt, fmtPrice, tsToTime, statusLabel, signClass, healthBadge, orderStatusChip,
      priceAgeMs, freshnessText,
      loadAll, loadPrices, loadOrders, loadPriceHistory, loadBalanceHistory, loadSmallLivePreflight,
      dryRunSmallLiveOrder, submitSmallLiveOrder, setBalanceRange,
      startSim, stopSim, randomOrder,
    }
  }
}).mount('#app')
</script>
</body>
</html>
