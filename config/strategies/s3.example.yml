# S3 · 资金费率套利（示例参数）
# 完整规则见 docs/03-详细设计/strategies/S3-资金费率套利.md

strategy:
  id: s3_funding_arb
  universe: scan                     # top 30 流动性；实现期由 Universe 脚本更新
  trigger_interval: 8h               # 资金费结算前 30min 评估（实现期定 cron）
  max_concurrent_pairs: 5

entry:
  funding_abs_threshold: 0.001       # |funding| ≥ 0.10%/8h
  basis_max_pct: 0.005               # |perp-spot|/spot ≤ 0.5%
  min_perp_volume_24h_usdt: 100_000_000
  min_spot_volume_24h_usdt: 50_000_000
  positive_funding_only: true        # Phase 1 只做正费率方向（spec §3.4）

risk:
  max_notional_per_leg_pct: 0.10     # 单笔腿 ≤ 10% equity
  basis_stop_pct: 0.01               # 基差扩大 ≥ 1% 强平
  leg_timeout_seconds: 30            # 半腿超时（trade_groups 状态机）
